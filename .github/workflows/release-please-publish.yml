on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please-publish

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.NOMBOT_CLASSIC_PERSONAL_ACCESS_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.release-please.outputs.paths_released) }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.x"
          enable-cache: false
      - name: Resolve package name
        id: pkg
        run: |
          if [ "${{ matrix.path }}" = "." ]; then
            echo "name=instro" >> "$GITHUB_OUTPUT"
          else
            echo "name=$(basename "${{ matrix.path }}")" >> "$GITHUB_OUTPUT"
          fi
      - name: Build wheel and sdist
        run: uv build --package "${{ steps.pkg.outputs.name }}" --out-dir dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

[project]
name = "instro-unstable"
version = "0.0.1"
description = "Unstable modules for instro (in-development features)"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.10,<4.0"
dependencies = [
    "instro",
]

[project.optional-dependencies]
ethernetip = ["instro-ethernetip-python>=0.1.0,<0.2.0"]
all = ["instro-ethernetip-python>=0.1.0,<0.2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
instro = { workspace = true }
instro-ethernetip-python = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["instro"]

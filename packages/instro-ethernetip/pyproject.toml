[project]
name = "instro-ethernetip"
version = "1.0.0"
description = "EtherNet/IP device support for instro: config-driven Allen-Bradley PLC tag access with a native PyO3 session backend"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.10,<3.14"
dependencies = ["instro"]

[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[tool.uv.sources]
instro = { workspace = true }

[tool.maturin]
bindings = "pyo3"
module-name = "instro.ethernetip._ethernetip"
python-source = "."

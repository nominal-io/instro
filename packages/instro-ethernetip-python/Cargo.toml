[package]
name = "instro-ethernetip-python"
version = "0.1.0"
edition = "2024"
rust-version = "1.88.0"
license = "Apache-2.0"

[lib]
name = "_ethernetip"
crate-type = ["cdylib"]

[dependencies]
instro-ethernetip-rs = { path = "../instro-ethernetip-rs", features = ["blocking"] }
pyo3 = { version = "0.28.3", default-features = false, features = ["abi3-py310", "extension-module", "macros"] }
